name: cupy-xarray-doc
channels:
  - conda-forge
dependencies:
  - cupy-core!=14.0.0,!=14.0.1 # https://github.com/cupy/cupy/issues/9777
  - pip
  - python=3.10
  - sphinx
  - sphinx-design
  - sphinx-copybutton
  - sphinx-autosummary-accessors
  - ipython
  - ipykernel
  - ipywidgets
  - furo>=2024.8.6
  - myst-nb
  - xarray
  - pip:
      # relative to this file. Needs to be editable to be accepted.
      - --editable ..
